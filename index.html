{% extends "base.html" %}

{% block title %}Главная — SANDPEXIK_Shop{% endblock %}

{% block content %}
  <h2 style="text-align:center; margin: 3rem 0;">Добро пожаловать в SANDPEXIK_Shop</h2>
  <p style="text-align:center; font-size:1.2rem;">Оригинальная техника Apple по лучшим ценам</p>

  <div class="grid" style="margin-top:3rem;">
    {% for product in products %}
      <div class="product-card" data-product-name="{{ product.name }}">
        <img src="{{ product.image }}" alt="{{ product.name }}">
        <div style="padding:1rem;">
          <h3>{{ product.name }}</h3>
          <p class="price">{{ product.price_usd }} $</p>
          <a href="{{ url_for('product', id=product.id) }}" class="btn">Подробнее</a>
          <button class="btn" data-add-to-cart="{{ product.id }}" data-product-title="{{ product.name }}">Добавить в корзину</button>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
